name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Smoke test server startup
        env:
          PORT: 3001
          AWS_REGION: us-east-1
          S3_BUCKET_NAME: ci-placeholder-bucket
          ENABLE_IMAGE_RESIZE: "false"
        run: npm run ci:smoke
